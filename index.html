<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>I love you Tania ❤️</title>

<style>
body {
    margin: 0;
    background: #f8eeee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Contenedor del corazón */
.heart-container {
    position: relative;
    width: 320px;
    height: 300px;
}

/* Corazones */
.heart {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    animation: aparecer 2s forwards;
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: scale(1.2);
    }
}

/* Texto */
.text {
    margin-top: 30px;
    font-size: 38px;
    color: crimson;
    opacity: 0;
    animation: mostrar 3s forwards;
    animation-delay: 2s;
}

@keyframes mostrar {
    to {
        opacity: 1;
        transform: scale(1.1);
    }
}

/* Corazones flotantes */
.floating {
    position: absolute;
    font-size: 14px;
    animation: subir 4s linear forwards;
}

@keyframes subir {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>
<body>

<div class="heart-container" id="heart"></div>
<div class="text">I love you Tania ❤️</div>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
const container = document.getElementById("heart");

/* Forma del corazón (más definida) */
const shape = [
"  ***   ***  ",
" ***** ***** ",
"*************",
"*************",
"*************",
" *********** ",
"  *********  ",
"   *******   ",
"    *****    ",
"     ***     ",
"      *      "
];

const space = 22;

shape.forEach((row, y) => {
    row.split("").forEach((col, x) => {
        if (col === "*") {
            const span = document.createElement("span");
            span.className = "heart";
            span.innerHTML = "❤️";
            span.style.left = (x * space) + "px";
            span.style.top = (y * space) + "px";
            span.style.animationDelay = (Math.random() * 1.5) + "s";
            container.appendChild(span);
        }
    });
});

/* Corazones flotando */
setInterval(() => {
    const h = document.createElement("div");
    h.className = "floating";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.top = "90%";

    document.body.appendChild(h);

    setTimeout(() => {
        h.remove();
    }, 4000);
}, 400);
</script>

</body>
</html>
